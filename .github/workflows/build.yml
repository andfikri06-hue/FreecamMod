name: Build FreecamMod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install cmake clang unzip wget -y

      - name: Download LeviLamina SDK
        run: |
          wget https://github.com/LiteLDev/LeviLamina/releases/download/v26.10.14/levilamina-v26.10.14-server-release-windows-x64.zip -O sdk.zip
          mkdir -p /opt/levilamina-sdk
          unzip sdk.zip -d /opt/levilamina-sdk

      - name: Debug SDK structure
        run: |
          echo "=== SDK root ==="
          ls -la /opt/levilamina-sdk/
          echo "=== include? ==="
          find /opt/levilamina-sdk -name "*.h" | head -20
          echo "=== lib? ==="
          find /opt/levilamina-sdk -name "*.so" -o -name "*.a" -o -name "*.lib" | head -20

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
                -DLEVILAMINA_SDK_DIR=/opt/levilamina-sdk
          cmake --build build -j4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreecamMod-SharedObject
          path: build/*.so
